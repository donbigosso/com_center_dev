<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Donbigosso Galleries</title>
    <meta property="og:title" content="Donbigosso Galleries">
    <meta property="og:description" content="Beautiful galleries by Donbigosso">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://donbigosso.polafri.pl/galleries/">
    <meta property="og:image" content="https://donbigosso.polafri.pl/images/logo.png">
    <meta property="og:image:width" content="400">
    <meta property="og:image:height" content="400">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header class="navbar navbar-expand navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-4" href="../">
                <img src="../images/logo.png" alt="Logo" width="60" height="60">
                Donbigosso Galleries
            </a>

            <div class="d-flex align-items-center gap-3">
                <span class="text-light me-3 logged-only">
                    <i class="bi bi-person-circle"></i>&nbsp;<strong id="user-field">john.doe</strong>
                </span>
                <button class="btn btn-outline-light me-2 unlogged-only" id="login-btn">Login</button>
                <button class="btn btn-outline-danger logged-only" id="logout-btn">Logout</button>
            </div>
        </div>
    </header>

    <main class="container mt-5">
        <!-- Add Gallery Button -->
        <div class="mb-5 d-flex justify-content-between align-items-center logged-only">
            <h1 class="text-primary">My Galleries</h1>
            <button class="btn btn-success" id="add-gallery-btn">
                <i class="bi bi-plus-circle"></i> Add Gallery
            </button>
        </div>

        <div class="unlogged-only">
            <h1 class="text-primary mb-4">Galleries</h1>
            <p class="text-muted">Log in to create and manage your galleries.</p>
        </div>

        <!-- Galleries Grid -->
        <div class="row g-4" id="galleries-grid">
            <!-- Gallery tiles inserted here -->
        </div>

        <!-- Loading Indicator -->
        <div class="text-center mt-5">
            <div class="spinner-border text-primary d-none" id="loading-spinner" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- End of content marker (for infinite scroll) -->
        <div id="scroll-sentinel" class="mt-5" style="height: 1px;"></div>

        <!-- Feedback -->
        <div id="global-feedback" class="position-fixed top-50 start-50 translate-middle bg-secondary text-white px-3 py-2 rounded shadow opacity-0" style="z-index: 1050; pointer-events: none;">
            Global feedback
        </div>
    </main>

    <!-- Generic Modal -->
    <div class="modal" id="my_modal" tabindex="-1" aria-labelledby="my-modal-label" aria-hidden="false" style="background-color: rgba(0,0,0,0.5);">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="my-modal-label">Modal Label</h5>
                    <button type="button" id="modal-close-btn" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Modal text
                </div>
                <div id="modal-alert-field" class="alert alert-danger m-3 mt-0" role="alert">
                    This is an error
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" id="modal-btn-1">Button 1</button>
                    <button type="button" class="btn btn-danger" id="modal-btn-2">Button 2</button>
                    <button type="button" class="btn btn-primary" id="modal-btn-3">Button 3</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-auto py-3 bg-dark text-light text-center">
        <div class="container">
            <span>Donbigosso 2026</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./app.js"></script>
</body>
</html>
